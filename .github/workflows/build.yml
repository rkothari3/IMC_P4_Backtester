name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.9

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff
        run: uv run ruff check

      - name: Run mypy
        run: uv run mypy prosperity4bt

      - name: Update version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        run: |
          TAG_VERSION="${GITHUB_REF##*/}"
          export TAG_VERSION
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          tag_version = os.environ["TAG_VERSION"]
          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          updated = re.sub(r'^version = ".*"$', f'version = "{tag_version}"', text, count=1, flags=re.MULTILINE)
          pyproject.write_text(updated, encoding="utf-8")
          PY

      - name: Build
        run: uv build

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: build

    environment:
      name: pypi
      url: https://pypi.org/p/prosperity4btest

    permissions:
      id-token: write

    steps:
      - name: Download all distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
